openapi: "3.0.3"
info:
  title: Payment Service API
  description: |
    Manages invoice generation and payment processing for AutoCare Pro.
    Invoices are created automatically by the Job Service upon job completion.
    The service fetches job and customer details from other services to build complete invoices.
  version: "1.0.0"
servers:
  - url: https://api.autocarepro.example.com
    description: Production (AWS API Gateway)
  - url: http://localhost:3003
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Payments
    description: Invoice and payment management
  - name: Health
    description: Service health check

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/payments:
    get:
      tags: [Payments]
      summary: List all payments and invoices (admin only)
      responses:
        "200":
          description: All payment records ordered by creation date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/payments/invoice:
    post:
      tags: [Payments]
      summary: Create invoice from completed job (called by Job Service)
      security: []
      description: |
        Internal endpoint called by the Job Service when a job is completed.
        Fetches job details from Job Service and customer info from Customer & Vehicle Service
        to build a complete invoice. Returns 409 if invoice already exists for this job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Invoice created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Invoice already exists for this job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/payments/customer/{customerId}:
    get:
      tags: [Payments]
      summary: Get payment history for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer's invoices ordered by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /api/payments/job/{jobId}:
    get:
      tags: [Payments]
      summary: Get payment linked to a specific job
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment for the specified job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment/invoice by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Full invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/payments/{id}/pay:
    post:
      tags: [Payments]
      summary: Process payment for an invoice
      description: |
        Marks the invoice as paid and calls Customer & Vehicle Service to update
        the customer's lifetime spending total.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethod]
              properties:
                paymentMethod:
                  type: string
                  enum: [cash, card]
                  example: cash
      responses:
        "200":
          description: Payment processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Invalid payment method or invoice already paid / cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/payments/{id}/receipt:
    get:
      tags: [Payments]
      summary: Get formatted receipt for a paid invoice
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
        "400":
          description: Invoice is not yet paid
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/payments/{id}/cancel:
    patch:
      tags: [Payments]
      summary: Cancel a pending invoice (admin only)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Invoice cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Cannot cancel a paid invoice
        "404":
          $ref: "#/components/responses/NotFoundError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:    { type: string, example: ok }
        service:   { type: string, example: payment-service }
        timestamp: { type: string, format: date-time }

    ErrorResponse:
      type: object
      properties:
        error:   { type: string }
        details: { type: string }

    CreateInvoiceRequest:
      type: object
      required: [jobId, customerId, laborCost, partsCost, serviceType]
      properties:
        jobId:       { type: integer, example: 1 }
        customerId:  { type: integer, example: 1 }
        laborCost:   { type: number, example: 2500.00 }
        partsCost:   { type: number, example: 1500.00 }
        serviceType: { type: string, example: Full Service }

    Payment:
      type: object
      properties:
        id:                  { type: integer }
        invoiceNumber:       { type: string, example: INV-20260317-001 }
        jobId:               { type: integer }
        customerId:          { type: integer }
        customerName:        { type: string, example: Nimal Perera }
        customerPhone:       { type: string, example: "0712345678" }
        vehicleRegistration: { type: string, example: CAB-1234 }
        serviceType:         { type: string }
        laborCost:           { type: number }
        partsCost:           { type: number }
        totalAmount:         { type: number }
        status:
          type: string
          enum: [pending, paid, cancelled]
        paymentMethod:
          type: string
          nullable: true
          enum: [cash, card]
        createdAt:  { type: string, format: date-time }
        paidAt:     { type: string, format: date-time, nullable: true }

    Receipt:
      type: object
      properties:
        receiptTitle:    { type: string, example: AutoCare Pro — Payment Receipt }
        invoiceNumber:   { type: string }
        customerName:    { type: string }
        vehicleReg:      { type: string }
        serviceType:     { type: string }
        laborCost:       { type: number }
        partsCost:       { type: number }
        totalAmount:     { type: number }
        paymentMethod:   { type: string }
        paidAt:          { type: string, format: date-time }
        footer:          { type: string, example: Thank you for choosing AutoCare Pro! }
