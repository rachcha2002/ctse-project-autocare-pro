name: Gateway CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gateway/**'

jobs:
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/autocare-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-manual:
    name: Manual Azure Deployment
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment Info
        run: echo "Deployment is handled manually locally due to University Active Directory restrictions on Service Principals."
