sonar.projectKey=autocare-pro_frontend
sonar.organization=rachcha2002
sonar.sources=src
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude page components from coverage (complex UI with external dependencies)
sonar.coverage.exclusions=src/pages/**/*,src/App.jsx,src/main.jsx

# Test files location
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx