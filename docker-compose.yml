services:
  # API Gateway
  api-gateway:
    build:
      context: ./gateway
    ports:
      - "80:80"
    environment:
      - CUSTOMER_VEHICLE_SERVICE_URL=http://customer-vehicle-service:3000
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3001
      - JOB_SERVICE_URL=http://job-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3003
    depends_on:
      - customer-vehicle-service
      - appointment-service
      - job-service
      - payment-service
    networks:
      - autocare-network
    restart: unless-stopped

  # Customer Vehicle Service
  customer-vehicle-service:
    build:
      context: ./services/customer-vehicle-service
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./services/customer-vehicle-service/.env
    networks:
      - autocare-network
    restart: unless-stopped

  # Appointment Service
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./services/appointment-service/.env
    networks:
      - autocare-network
    restart: unless-stopped

  # Job Service
  job-service:
    build:
      context: ./services/job-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ./services/job-service/.env
    networks:
      - autocare-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - ./services/payment-service/.env
    networks:
      - autocare-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:80
    depends_on:
      - gateway
    networks:
      - autocare-network
    restart: unless-stopped

networks:
  autocare-network:
    driver: bridge
